version: '3.8'

services:
  # ── n8n Automation Orchestrator ──────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: clara-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=clara
      - N8N_BASIC_AUTH_PASSWORD=clara2024
      - GENERIC_TIMEZONE=America/New_York
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n_data:/home/node/.n8n
      - ./:/data/project
    working_dir: /data/project

  # ── Clara Pipeline (Python) ─────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clara-pipeline
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
      - ./dataset:/app/dataset
    env_file:
      - .env
    working_dir: /app
    command: ["python", "-m", "scripts.pipeline", "--batch"]

  # ── Dashboard (Flask) ───────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clara-dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    env_file:
      - .env
    working_dir: /app
    command: ["python", "dashboard/app.py"]

volumes:
  n8n_data:
